<!DOCTYPE html>

  <!-- Bootstrap CSS (5系) -->

  <!-- カスタムCSS -->

  <style>
    /* iPhone 17 Pro 393×852向け最適化 */
    body, html {
      width: 393px;
      height: 852px;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .container-fluid {
      max-width: 393px;
      padding-bottom: 70px;
      padding-top: 70px;
      margin-top: 0;
    }
    .small-text { font-size: 0.7rem; }
    .date-card-link { text-decoration: none; }
    .date-card {
      border: 1px solid #dee2e6;
      border-radius: 0.5rem;
      padding: 0.8rem 0.5rem;
      margin-bottom: 0.5rem;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 700;
      color: #212529;
      background-color: #fff;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }
    .date-card:hover {
      background-color: #f8f9fa;
    }
    .project-top-title {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 800;
      margin: 0.18rem 0 0.45rem;
      line-height: 1.2;
      color: #212529;
    }
    .date-weather-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 0 0.68rem;
    }
    .detail-date {
      text-align: left;
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
    }
    .detail-weather {
      text-align: right;
      font-size: 0.6rem;
      font-weight: 400;
      color: #495057;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.25rem;
    }
    .detail-weather i {
      font-size: 0.9rem;
      color: #f0ad4e;
      line-height: 1;
    }
    .project-header-nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 393px;
      height: 70px;
      background: black;
      color: white;
      z-index: 1100;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 6px;
    }
    .project-header-item { flex: 1; text-align: center; min-width: 0; }
    .project-header-link {
      color: white;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .project-header-icon { font-size: 1.45rem; line-height: 1; display: block; }
    .project-header-label {
      font-size: 0.42rem;
      margin-top: 0.14rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .project-header-nav .dropdown-menu { max-width: 220px; }
    .bottom-quick-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 393px;
      height: 70px;
      background: black;
      color: white;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 6px;
      border-top-left-radius: 0.5rem;
      border-top-right-radius: 0.5rem;
    }
    .bottom-quick-nav a {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-decoration: none;
      min-width: 0;
    }
    .bottom-quick-nav a i { font-size: 1.45rem; line-height: 1; }

      font-size: 0.42rem;
      font-weight: 500;
      margin-top: 0.14rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;

      font-size: 1.05rem;

      margin: 0.6rem 0 0.85rem;
