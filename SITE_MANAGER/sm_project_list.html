<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>工事管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    /* iPhone 17 Pro 393×852向け最適化 */
    body, html {
      width: 393px;
      height: 852px;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .container-fluid {
      max-width: 393px;
      padding-bottom: 60px; /* フッター分のスペース */
      margin-top: 0.5rem;
    }
    /* パネル専用: 低いカードで横1行レイアウト */
    .card-project {
      font-size: 0.72rem;
      min-height: 52px;
    }
    .card-project .card-body {
      padding: 0.35rem 0.5rem;
    }
    .project-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
      overflow: hidden;
    }
    .card-project .card-image {
      width: 36px;
      height: 36px;
      object-fit: cover;
      border-radius: 0.2rem;
      flex: 0 0 36px;
    }
    .project-title {
      font-weight: 600;
      font-size: 1.2rem;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .project-type {
      font-size: 0.66rem;
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Footer fixed */
    #footer-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 393px;
      z-index: 1000;
      background-color: white;
    }
    #footer-container footer {
      width: 100%;
    }
    /* ボタンの調整 */
    .btn {
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
    }
  </style>
</head>
<body>
  <div class="container-fluid mt-4">
    <!-- ヘッダー行 -->
    <div class="mb-2 px-2">
      <h5 class="mb-0">工事リスト</h5>
    </div>
    <!-- パネル表示 -->
    <div id="panelView" class="px-2">
      <!-- カード1：国道9号線舗装工事 -->
      <div class="mb-2">
        <a href="sm_project_detail.html" class="text-decoration-none text-reset">
          <div class="card card-project">
            <div class="card-body">
              <div class="project-row">
                <img src="../images/improveroad.webp" class="card-image" alt="工事画像">
                <div class="flex-grow-1 overflow-hidden text-start">
                  <div class="project-title">国道9号線舗装工事</div>
                  <div class="project-type">工事名: アスファルト舗装工事</div>
                </div>
              </div>
            </div>
          </div>
        </a>
      </div>
      <!-- カード2：本社駐車場舗装工事 -->
      <div class="mb-2">
        <a href="sm_project_detail.html" class="text-decoration-none text-reset">
          <div class="card card-project">
            <div class="card-body">
              <div class="project-row">
                <img src="../images/parking.webp" class="card-image" alt="工事画像">
                <div class="flex-grow-1 overflow-hidden text-start">
                  <div class="project-title">本社駐車場舗装工事</div>
                  <div class="project-type">工事名: 駐車場舗装工事</div>
                </div>
              </div>
            </div>
          </div>
        </a>
      </div>
      <!-- カード3：市道拡幅工事 -->
      <div class="mb-2">
        <a href="sm_project_detail.html" class="text-decoration-none text-reset">
          <div class="card card-project">
            <div class="card-body">
              <div class="project-row">
                <img src="../images/night.webp" class="card-image" alt="工事画像">
                <div class="flex-grow-1 overflow-hidden text-start">
                  <div class="project-title">市道拡幅工事</div>
                  <div class="project-type">工事名: 道路拡幅工事</div>
                </div>
              </div>
            </div>
          </div>
        </a>
      </div>
      <!-- カード4：側溝改修工事 -->
      <div class="mb-2">
        <a href="sm_project_detail.html" class="text-decoration-none text-reset">
          <div class="card card-project">
            <div class="card-body">
              <div class="project-row">
                <img src="../images/Vgatasokou.webp" class="card-image" alt="工事画像">
                <div class="flex-grow-1 overflow-hidden text-start">
                  <div class="project-title">側溝改修工事</div>
                  <div class="project-type">工事名: 側溝工事</div>
                </div>
              </div>
            </div>
          </div>
        </a>
      </div>
      <!-- カード5：アスファルト補修工事 -->
      <div class="mb-2">
        <a href="sm_project_detail.html" class="text-decoration-none text-reset">
          <div class="card card-project">
            <div class="card-body">
              <div class="project-row">
                <img src="../images/night.webp" class="card-image" alt="工事画像">
                <div class="flex-grow-1 overflow-hidden text-start">
                  <div class="project-title">アスファルト補修工事</div>
                  <div class="project-type">工事名: 道路補修工事</div>
                </div>
              </div>
            </div>
          </div>
        </a>
      </div>
    </div>
  </div>

  <!-- フッター -->
  <div id="footer-container"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- カスタムスクリプト -->
  <script src="../style.js"></script>
  <!-- フッター読み込み & 切替ロジック -->
  <script>
    // フッター読み込み
    fetch('sm_footer.html')
      .then(r => r.text())
      .then(html => document.getElementById('footer-container').innerHTML = html);

    // パネル表示のみ
    document.getElementById('panelView').style.display = 'block';
  </script>
</body>
</html>
