<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>案件管理（工事日誌作成 - ステップ7・出来高）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- Bootstrap CSS (5系) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- カスタムCSS -->
  <link rel="stylesheet" href="../style.css">
  <style>
    /* iPhone 17 Pro 393×852向け最適化 */
    body, html {
      width: 393px;
      height: 852px;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .container-fluid {
      max-width: 393px;
      padding-bottom: 70px;
      padding-top: 70px;
      margin-top: 0;
    }
    .small-text { font-size: 0.7rem; }
    .project-title { white-space: nowrap; font-size: 0.9rem; }
    .inspection-ok { color: #198754; }
    .inspection-ng { color: #dc3545; }
    /* Footer fixed */
    #footer-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 393px;
      z-index: 1000;
    }
    #footer-container footer {
      width: 100%;
    }
    /* ステップインジケーター */
    .step-indicator {
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      flex-wrap: nowrap;
      justify-content: flex-start;
      align-items: flex-start;
      padding: 0.5rem 0.25rem;
      margin-bottom: 1rem;
      background-color: #f8f9fa;
      border-radius: 0.5rem;
      position: relative;
    }
    .step-item {
      flex: 0 0 auto;
      min-width: 38px;
      max-width: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }
    .step-btn {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: none;
      border: none;
      padding: 0.2rem 0.1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .step-btn:hover {
      background-color: rgba(13, 110, 253, 0.1);
      border-radius: 0.25rem;
    }
    .step-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.8rem;
      margin-bottom: 0.2rem;
      position: relative;
      z-index: 2;
      transition: all 0.2s;
    }
    .step-circle.active {
      background-color: #0d6efd;
      color: white;
    }
    .step-circle.completed {
      background-color: #198754;
      color: white;
    }
    .step-circle.inactive {
      background-color: #e9ecef;
      color: #6c757d;
    }
    .step-label {
      font-size: 0.45rem;
      color: #6c757d;
      text-align: center;
      line-height: 1.2;
    }
    .step-item.active .step-label {
      color: #0d6efd;
      font-weight: bold;
    }
    .step-item.completed .step-label {
      color: #198754;
    }
    .step-connector {
      position: absolute;
      top: 14px;
      left: calc(50% + 14px);
      right: calc(-50% + 14px);
      height: 2px;
      background-color: #e9ecef;
      z-index: 0;
    }
    .step-item:last-child .step-connector {
      display: none;
    }
    .step-item.completed .step-connector {
      background-color: #198754;
    }
    .step-item.active .step-connector {
      background-color: #0d6efd;
    }
    .preview-btn-container { display: none; }
    /* 音声入力ボタン */
    .voice-input-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: white;
      font-weight: bold;
    }
    .voice-input-btn:hover {
      background: linear-gradient(135deg, #5568d3 0%, #653a8f 100%);
      color: white;
    }
    .voice-input-btn.recording {
      background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    /* ====== 共通：ヘッダ/日付/天気/固定フッタ（sm_project_detail と同じ） ====== */
    .project-top-title {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 800;
      margin: 0.18rem 0 0.45rem;
      line-height: 1.2;
      color: #212529;
    }
    .date-weather-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 0 0.68rem;
    }
    .detail-date {
      text-align: left;
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
    }
    .detail-weather {
      text-align: right;
      font-size: 0.6rem;
      font-weight: 400;
      color: #495057;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.25rem;
    }
    .detail-weather i {
      font-size: 0.9rem;
      color: #f0ad4e;
      line-height: 1;
    }
    .project-header-nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 393px;
      height: 70px;
      background: black;
      color: white;
      z-index: 1100;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 6px;
    }
    .project-header-item { flex: 1; text-align: center; min-width: 0; }
    .project-header-link {
      color: white;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .project-header-icon { font-size: 1.45rem; line-height: 1; display: block; }
    .project-header-label { font-size: 0.42rem; margin-top: 0.14rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-header-nav .dropdown-menu { max-width: 220px; }
    .bottom-quick-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 393px;
      height: 70px;
      background: black;
      color: white;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 6px;
      border-top-left-radius: 0.5rem;
      border-top-right-radius: 0.5rem;
    }
    .bottom-quick-nav a {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-decoration: none;
      min-width: 0;
    }
    .bottom-quick-nav a i { font-size: 1.45rem; line-height: 1; }
    .bottom-quick-nav .bottom-nav-label {
      font-size: 0.42rem;
      font-weight: 500;
      margin-top: 0.14rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .page-heading {
      text-align: center;
      font-size: 1.05rem;
      font-weight: 800;
      margin: 0.6rem 0 0.85rem;
      color: #212529;
    }
    .output-card {
      border: 1px solid #dee2e6;
      border-radius: 0.5rem;
      overflow: hidden;
      margin-bottom: 0.75rem;
      background: #fff;
    }
    .output-card-header {
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
      padding: 0.5rem 0.65rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.4rem;
    }
    .output-card-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: #212529;
      line-height: 1.35;
    }
    .output-card-body {
      padding: 0.65rem 0.75rem;
    }
    .output-table {
      font-size: 0.72rem;
      margin-bottom: 0.7rem;
    }
    .output-table th {
      width: 34%;
      background-color: #f8f9fa;
      white-space: nowrap;
    }
    .output-table td, .output-table th {
      padding: 0.4rem 0.45rem;
      vertical-align: middle;
    }
    .label-mini {
      font-size: 0.65rem;
      font-weight: 600;
      color: #495057;
      margin-bottom: 0.25rem;
    }
    .doc-row {
      display: flex;
      gap: 0.85rem;
      align-items: center;
    }
    .point-cloud-action {
      display: flex;
      justify-content: center;
      margin-top: 0.25rem;
    }
    .doc-btn {
      padding: 0.2rem;
      border: none;
      background: none;
      color: #0d6efd;
      line-height: 1;
      cursor: pointer;
    }
    .doc-btn i { font-size: 1.4rem; vertical-align: middle; }
    .doc-btn:hover { color: #0a58ca; }
  </style>
</head>
<body>
  <header class="project-header-nav" aria-label="ページヘッダメニュー">
    <div class="project-header-item">
      <a href="sm_project_list.html" class="project-header-link">
        <i class="bi bi-list-ul project-header-icon"></i>

    <div class="project-header-item">
      <a href="sm_chat_list.html" class="project-header-link">

  </header>

  <div class="container-fluid px-2">
    <div class="project-top-title">国道９号線舗装工事</div>
    <div class="date-weather-row">
      <div class="detail-date">2026/03/14（土）</div>
      <div class="detail-weather">
        <i class="bi bi-sun-fill"></i>
        <span>18°C / 7°C</span>
      </div>
    </div>

    <div class="d-flex align-items-center mb-2">
      <a href="sm_project_detail.html" class="btn btn-outline-secondary btn-sm" style="font-size: 0.75rem; padding: 0.55rem 0.7rem;">
        <i class="bi bi-arrow-left me-1"></i>本日の作業予定へ戻る
      </a>
    </div>

    <!-- ステップインジケーター（9ステップ） -->
    <div class="step-indicator" aria-label="ステップ進行">
      <div class="step-item completed">
        <button type="button" class="step-btn" onclick="goToStep(1)">
          <div class="step-circle completed">1</div>
          <div class="step-label">概要</div>
        </button>
        <div class="step-connector"></div>
      </div>
      <div class="step-item completed">
        <button type="button" class="step-btn" onclick="goToStep(2)">
          <div class="step-circle completed">2</div>
          <div class="step-label">工種</div>
        </button>
        <div class="step-connector"></div>
      </div>
      <div class="step-item completed">
        <button type="button" class="step-btn" onclick="goToStep(3)">
          <div class="step-circle completed">3</div>
          <div class="step-label">機器</div>
        </button>
        <div class="step-connector"></div>
      </div>
      <div class="step-item completed">
        <button type="button" class="step-btn" onclick="goToStep(4)">
          <div class="step-circle completed">4</div>
          <div class="step-label">業者</div>
        </button>
        <div class="step-connector"></div>
      </div>
      <div class="step-item completed">
        <button type="button" class="step-btn" onclick="goToStep(5)">
          <div class="step-circle completed">5</div>
          <div class="step-label">材料</div>
        </button>
        <div class="step-connector"></div>
      </div>
      <div class="step-item completed">
        <button type="button" class="step-btn" onclick="goToStep(6)">
          <div class="step-circle completed">6</div>
          <div class="step-label">資材</div>
        </button>
        <div class="step-connector"></div>
      </div>
      <div class="step-item active">
        <button type="button" class="step-btn" onclick="goToStep(7)">
          <div class="step-circle active">7</div>
          <div class="step-label">出来高</div>
        </button>
        <div class="step-connector"></div>
      </div>
      <div class="step-item">
        <button type="button" class="step-btn" onclick="goToStep(8)">
          <div class="step-circle inactive">8</div>
          <div class="step-label">記事</div>
        </button>
        <div class="step-connector"></div>
      </div>
      <div class="step-item">
        <button type="button" class="step-btn" onclick="goToStep(9)">
          <div class="step-circle inactive">9</div>
          <div class="step-label">提出</div>
        </button>
      </div>
    </div>

    <h1 class="page-heading">出来高確認</h1>

    <div id="outputCards">
      <div class="output-card">
        <div class="output-card-header">
          <div class="output-card-title">表層工</div>
          <button type="button" class="btn btn-link p-0 text-secondary" aria-label="編集" title="編集">
            <i class="bi bi-pencil-square" style="font-size: 1.1rem;"></i>
          </button>
        </div>
        <div class="output-card-body">
          <table class="table table-bordered output-table">
            <tbody>
              <tr>
                <th>工事内容</th>
                <td>アスファルト混合物敷均し・転圧仕上げ</td>
              </tr>
              <tr>
                <th>工事箇所</th>
                <td>国道9号 上り線 KP12.4付近</td>
              </tr>
              <tr>
                <th>出来高</th>
                <td>450 ㎡</td>
              </tr>
            </tbody>
          </table>
          <div class="label-mini">添付ファイル</div>
          <div class="doc-row">
            <input type="file" class="d-none output-file" accept="image/*" capture="environment" id="output0file0">
            <button type="button" class="doc-btn" aria-label="点群ビューを表示" title="点群ビュー表示" onclick="showPointCloudView()">
              <i class="bi bi-file-earmark-text" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="output-card">
        <div class="output-card-header">
          <div class="output-card-title">路盤工</div>
          <button type="button" class="btn btn-link p-0 text-secondary" aria-label="編集" title="編集">
            <i class="bi bi-pencil-square" style="font-size: 1.1rem;"></i>
          </button>
        </div>
        <div class="output-card-body">
          <table class="table table-bordered output-table">
            <tbody>
              <tr>
                <th>工事内容</th>
                <td>粒度調整砕石敷均し・不陸整正</td>
              </tr>
              <tr>
                <th>工事箇所</th>
                <td>国道9号 下り線 交差点流入部</td>
              </tr>
              <tr>
                <th>出来高</th>
                <td>320 ㎡</td>
              </tr>
            </tbody>
          </table>
          <div class="point-cloud-action">
            <button type="button" class="btn btn-outline-primary btn-sm" onclick="showPointCloudStart()">
              <i class="bi bi-bounding-box me-1"></i>点群取得
            </button>
          </div>
        </div>
      </div>
    </div>

    <button type="button" class="btn btn-outline-primary w-100 mb-3" id="btnAddOutput" style="font-size: 0.8rem;">
      <i class="bi bi-plus-circle me-1"></i>追加する
    </button>

    <!-- 戻る・次へボタン -->
    <div class="d-flex justify-content-between mb-2">
      <a href="sm_project_detail_report_create_step6.html" class="btn btn-outline-secondary btn-sm" style="font-size: 0.7rem;">
        <i class="bi bi-arrow-left"></i> 戻る
      </a>
      <a href="sm_project_detail_report_create_step8.html" class="btn btn-primary btn-sm" style="font-size: 0.7rem;">
        確認して 次へ
      </a>
    </div>
  </div>

  <div class="modal fade" id="pointCloudViewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h2 class="modal-title fs-6">点群ビュー</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
        </div>
        <div class="modal-body text-center" style="font-size: 0.78rem;">
          点群のビューが表示されます
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="pointCloudStartModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h2 class="modal-title fs-6">点群取得</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
        </div>
        <div class="modal-body text-center" style="font-size: 0.78rem;">
          点群取得開始します。
        </div>
      </div>
    </div>
  </div>
  
  <!-- フッター -->
  <nav class="bottom-quick-nav" aria-label="ページ内メニュー">
    <a href="sm_project_detail_overview.html">
      <i class="bi bi-card-text"></i>
      <div class="bottom-nav-label">工事概要</div>
    </a>
    <a href="sm_project_detail_budget_summary.html">
      <i class="bi bi-bar-chart-line"></i>
      <div class="bottom-nav-label">予算実績</div>
    </a>
    <a href="sm_project_detail_report.html">
      <i class="bi bi-journal-text"></i>
      <div class="bottom-nav-label">日誌一覧</div>
    </a>
    <a href="sm_project_detail_schedule_summary.html">
      <i class="bi bi-calendar3"></i>
      <div class="bottom-nav-label">スケジュール</div>
    </a>
    <a href="sm_project_detail_drawing.html">
      <i class="bi bi-file-earmark-image"></i>
      <div class="bottom-nav-label">図面</div>
    </a>
  </nav>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../style.js"></script>
  <script>
    function showPointCloudView() {
      new bootstrap.Modal(document.getElementById('pointCloudViewModal')).show();
    }

    function showPointCloudStart() {
      new bootstrap.Modal(document.getElementById('pointCloudStartModal')).show();
    }

    (function () {
      var nextIndex = 2;

      document.getElementById('btnAddOutput').addEventListener('click', function () {
        var wrap = document.getElementById('outputCards');
        var n = nextIndex++;
        var card = document.createElement('div');
        card.className = 'output-card';
        card.innerHTML = [
          '<div class="output-card-header">',
          '<div class="output-card-title">（工種名を追加）</div>',
          '<button type="button" class="btn btn-link p-0 text-secondary" aria-label="編集" title="編集">',
          '<i class="bi bi-pencil-square" style="font-size: 1.1rem;"></i></button></div>',
          '<div class="output-card-body">',
          '<table class="table table-bordered output-table"><tbody>',
          '<tr><th>工事内容</th><td>（工事内容を追加）</td></tr>',
          '<tr><th>工事箇所</th><td>（工事箇所を追加）</td></tr>',
          '<tr><th>出来高</th><td>（数値と単位を追加）</td></tr>',
          '</tbody></table>',
          '<div class="label-mini">添付ファイル</div>',
          '<div class="doc-row">',
          '<input type="file" class="d-none output-file" accept="image/*" capture="environment" id="output', n, 'file0">',
          '<button type="button" class="doc-btn" aria-label="点群ファイルを添付" title="点群ファイル添付" data-pick="output', n, 'file0">',
          '<i class="bi bi-file-earmark-text" aria-hidden="true"></i></button>',
          '</div></div>'
        ].join('');
        wrap.appendChild(card);
        card.querySelectorAll('.doc-btn[data-pick]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var id = btn.getAttribute('data-pick');
            var inp = document.getElementById(id);
            if (inp) { inp.value = ''; inp.click(); }
          });
        });
      });
    })();

    function goToStep(step) {
      var map = {
        1: 'sm_project_detail_report_create.html',
        2: 'sm_project_detail_report_create_step2.html',
        3: 'sm_project_detail_report_create_step3.html',
        4: 'sm_project_detail_report_create_step4.html',
        5: 'sm_project_detail_report_create_step5.html',
        6: 'sm_project_detail_report_create_step6.html',
        7: 'sm_project_detail_report_create_step7.html',
        8: 'sm_project_detail_report_create_step8.html',
        9: 'sm_project_detail_report_create_step9.html'
      };
      var url = map[step];
      if (url) window.location.href = url;
    }
  </script>
</body>
