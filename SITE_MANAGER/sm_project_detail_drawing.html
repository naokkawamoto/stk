<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>案件管理（図面）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css">
  <style>
    body, html {
      width: 393px;
      height: 852px;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .container-fluid {
      max-width: 393px;
      padding-bottom: 70px;
      padding-top: 70px;
      margin-top: 0;
    }
    .small-text { font-size: 0.7rem; }
    .drawing-card { transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
    .drawing-card:hover { transform: translateY(-2px); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .drawing-card img { width: 100%; height: 120px; object-fit: cover; border-bottom: 1px solid #dee2e6; }
    .drawing-card .card-body { padding: 8px; }
    .drawing-card .card-title { font-size: 0.75rem; font-weight: bold; margin-bottom: 2px; }
    .drawing-card .card-text { font-size: 0.65rem; color: #6c757d; }
    .lightbox-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; justify-content: center; align-items: center; }
    .lightbox-overlay.active { display: flex; }
    .lightbox-content { max-width: 90%; max-height: 90%; position: relative; }
    .lightbox-content img { max-width: 100%; max-height: 85vh; object-fit: contain; }
    .lightbox-close { position: absolute; top: -40px; right: 0; color: white; font-size: 2rem; cursor: pointer; }
    .lightbox-title { color: white; text-align: center; margin-top: 10px; font-size: 1rem; }
    .add-drawing-card { border: 2px dashed #dee2e6; background-color: #f8f9fa; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 160px; cursor: pointer; transition: border-color 0.2s, background-color 0.2s; }
    .add-drawing-card:hover { border-color: #0d6efd; background-color: #e7f1ff; }
    .add-drawing-card i { font-size: 2rem; color: #6c757d; margin-bottom: 8px; }
    .add-drawing-card span { color: #6c757d; font-size: 0.75rem; }
    .project-top-title {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 800;
      margin: 0.18rem 0 0.45rem;
      line-height: 1.2;
      color: #212529;
    }
    .date-weather-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 0 0.68rem;
    }
    .detail-date {
      text-align: left;
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
    }
    .detail-weather {
      text-align: right;
      font-size: 0.6rem;
      font-weight: 400;
      color: #495057;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.25rem;
    }
    .detail-weather i {
      font-size: 0.9rem;
      color: #f0ad4e;
      line-height: 1;
    }
    .project-header-nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 393px;
      height: 70px;
      background: black;
      color: white;
      z-index: 1100;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 6px;
    }
    .project-header-item { flex: 1; text-align: center; min-width: 0; }
    .project-header-link {
      color: white;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .project-header-icon { font-size: 1.45rem; line-height: 1; display: block; }
    .project-header-label {
      font-size: 0.42rem;
      margin-top: 0.14rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .project-header-nav .dropdown-menu { max-width: 220px; }
    .bottom-quick-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 393px;
      height: 70px;
      background: black;
      color: white;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 6px;
      border-top-left-radius: 0.5rem;
      border-top-right-radius: 0.5rem;
    }
    .bottom-quick-nav a {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-decoration: none;
      min-width: 0;
    }
    .bottom-quick-nav a i { font-size: 1.45rem; line-height: 1; }
    .bottom-quick-nav .bottom-nav-label {
      font-size: 0.42rem;
      font-weight: 500;
      margin-top: 0.14rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .page-heading {
      text-align: center;
      font-size: 1.05rem;
      font-weight: 800;
      margin: 0.6rem 0 0.85rem;
      color: #212529;
    }
  </style>
</head>
<body>
  <header class="project-header-nav" aria-label="ページヘッダメニュー">
    <div class="project-header-item">
      <a href="sm_project_list.html" class="project-header-link">
        <i class="bi bi-list-ul project-header-icon"></i>
        <div class="project-header-label">案件一覧</div>
      </a>
    </div>
    <div class="project-header-item">
      <a href="sm_chat_list.html" class="project-header-link">
        <i class="bi bi-chat-dots-fill project-header-icon"></i>
        <div class="project-header-label">チャット</div>
      </a>
    </div>
    <div class="project-header-item">
      <a href="sm_notifications.html" class="project-header-link">
        <i class="bi bi-bell-fill project-header-icon"></i>
        <div class="project-header-label">お知らせ</div>
      </a>
    </div>
    <div class="project-header-item dropdown">
      <a href="#" class="project-header-link" data-bs-toggle="dropdown" aria-expanded="false" id="headerMenuBtn">
        <i class="bi bi-three-dots-vertical project-header-icon"></i>
        <div class="project-header-label">メニュー</div>
      </a>
      <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="headerMenuBtn">
        <li><a class="dropdown-item" href="sm_myprof.html"><i class="bi bi-person-fill me-2"></i>山田太郎</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item" href="login.html">ログアウト</a></li>
      </ul>
    </div>
  </header>

  <div class="container-fluid px-2">
    <div class="project-top-title">国道９号線舗装工事</div>
    <div class="date-weather-row">
      <div class="detail-date">2026/03/14（土）</div>
      <div class="detail-weather">
        <i class="bi bi-sun-fill"></i>
        <span>18°C / 7°C</span>
      </div>
    </div>

    <div class="d-flex align-items-center mb-2">
      <a href="sm_project_detail.html" class="btn btn-outline-secondary btn-sm me-2">
        <i class="bi bi-arrow-left"></i> 本日の作業予定に戻る
      </a>
    </div>

    <h1 class="page-heading">図面</h1>

    <div class="card mb-2">
      <div class="card-header py-1 d-flex justify-content-between align-items-center">
        <span class="fw-bold small-text">図面一覧</span>
        <span class="text-white small fw-bold bg-dark px-2 py-1 rounded" style="font-size: 0.6rem;">全5件</span>
      </div>
      <div class="card-body p-2">
        <div class="row g-2">
          <div class="col-6">
            <div class="card drawing-card" onclick="openLightbox('../images/heimen.webp', '平面図')">
              <img src="../images/heimen.webp" alt="平面図">
              <div class="card-body">
                <h6 class="card-title">平面図</h6>
                <p class="card-text">道路平面図（国道9号線）</p>
              </div>
            </div>
          </div>
          <div class="col-6">
            <div class="card drawing-card" onclick="openLightbox('../images/danmen.webp', '断面図')">
              <img src="../images/danmen.webp" alt="断面図">
              <div class="card-body">
                <h6 class="card-title">断面図</h6>
                <p class="card-text">道路断面図（横断面）</p>
              </div>
            </div>
          </div>
          <div class="col-6">
            <div class="card drawing-card" onclick="openLightbox('../images/hosoukousei.webp', '舗装構成図')">
              <img src="../images/hosoukousei.webp" alt="舗装構成図">
              <div class="card-body">
                <h6 class="card-title">舗装構成図</h6>
                <p class="card-text">舗装層構成詳細</p>
              </div>
            </div>
          </div>
          <div class="col-6">
            <div class="card drawing-card" onclick="openLightbox('../images/hosoutenkai.webp', '舗装展開図')">
              <img src="../images/hosoutenkai.webp" alt="舗装展開図">
              <div class="card-body">
                <h6 class="card-title">舗装展開図</h6>
                <p class="card-text">舗装工区画展開図</p>
              </div>
            </div>
          </div>
          <div class="col-6">
            <div class="card drawing-card" onclick="openLightbox('../images/kukakusen.webp', '区画線図')">
              <img src="../images/kukakusen.webp" alt="区画線図">
              <div class="card-body">
                <h6 class="card-title">区画線図</h6>
                <p class="card-text">区画線配置図</p>
              </div>
            </div>
          </div>
          <div class="col-6">
            <div class="card add-drawing-card" onclick="document.getElementById('fileInput').click()">
              <i class="bi bi-plus-circle"></i>
              <span>図面を追加</span>
            </div>
            <input type="file" id="fileInput" accept="image/*,.pdf" style="display: none;" onchange="handleFileUpload(this)">
          </div>
        </div>
      </div>
    </div>

    <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
      <div class="lightbox-content" onclick="event.stopPropagation()">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-title" id="lightbox-title"></div>
      </div>
    </div>
  </div>

  <nav class="bottom-quick-nav" aria-label="ページ内メニュー">
    <a href="sm_project_detail_overview.html">
      <i class="bi bi-card-text"></i>
      <div class="bottom-nav-label">工事概要</div>
    </a>
    <a href="sm_project_detail_budget_summary.html">
      <i class="bi bi-bar-chart-line"></i>
      <div class="bottom-nav-label">予算実績</div>
    </a>
    <a href="sm_project_detail_report.html">
      <i class="bi bi-journal-text"></i>
      <div class="bottom-nav-label">日誌一覧</div>
    </a>
    <a href="sm_project_detail_schedule_summary.html">
      <i class="bi bi-calendar3"></i>
      <div class="bottom-nav-label">スケジュール</div>
    </a>
    <a href="sm_project_detail_drawing.html">
      <i class="bi bi-file-earmark-image"></i>
      <div class="bottom-nav-label">図面</div>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../style.js"></script>
  <script>
    function openLightbox(src, title) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox-title').textContent = title;
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        closeLightbox();
      }
    });

    function handleFileUpload(input) {
      if (input.files && input.files[0]) {
        var file = input.files[0];
        alert('ファイル「' + file.name + '」をアップロードしました。');
      }
    }
  </script>
</body>
</html>
